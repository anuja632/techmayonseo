<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Techmayon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
  overflow:hidden;
}

/* Glow Background */
body::before{
  content:'';
  position:absolute;
  width:500px;
  height:500px;
  background: radial-gradient(circle,#6a00ff,transparent);
  top:-150px;
  left:-150px;
  filter:blur(120px);
}

body::after{
  content:'';
  position:absolute;
  width:500px;
  height:500px;
  background: radial-gradient(circle,#ff5e00,transparent);
  bottom:-150px;
  right:-150px;
  filter:blur(120px);
}

/* CARD */
.container{
  width:100%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
}

.logo{
  width:100px;
  margin-bottom:10px;
}

.title{
  font-size:24px;
  font-weight:700;
  color:#a855f7;
}

.subtitle{
  font-size:14px;
  color:#ccc;
}

/* SOCIAL */
.social{
  margin-top:12px;
}

.social i{
  margin:0 10px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

.social i:hover{
  color:#ff5e00;
}

/* LINKS */
.link{
  margin-top:15px;
  padding:15px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
  transition:0.3s;
}

.link:hover{
  transform:translateY(-4px);
  background: linear-gradient(90deg,#6a00ff,#ff5e00);
}

.link-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.link i{
  font-size:18px;
}

/* CTA */
.cta{
  margin-top:25px;
}

.cta button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background: linear-gradient(90deg,#6a00ff,#ff5e00);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.cta button:hover{
  opacity:0.85;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  color:#aaa;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img src="https://www.techmayon.com/assets/img/logo.png" class="logo">
    <div class="title">Techmayon</div>
    <div class="subtitle">Transforming Clicks into Conversions 🚀</div>

    <div class="social">
      <i class="fab fa-facebook" onclick="openLink('#')"></i>
      <i class="fab fa-instagram" onclick="openLink('#')"></i>
      <i class="fab fa-linkedin" onclick="openLink('#')"></i>
      <i class="fab fa-whatsapp" onclick="openLink('#')"></i>
    </div>
  </div>

  <!-- LINKS -->
  <div class="link" onclick="openLink('https://www.techmayon.com/')">
    <div class="link-left">
      <i class="fas fa-globe"></i>
      <span>Visit Website</span>
    </div>
    <i class="fas fa-arrow-right"></i>
  </div>

  <div class="link" onclick="openLink('#')">
    <div class="link-left">
      <i class="fas fa-code"></i>
      <span>Web Development</span>
    </div>
    <i class="fas fa-arrow-right"></i>
  </div>

  <div class="link" onclick="openLink('#')">
    <div class="link-left">
      <i class="fas fa-bullhorn"></i>
      <span>Digital Marketing</span>
    </div>
    <i class="fas fa-arrow-right"></i>
  </div>

  <div class="link" onclick="openLink('#')">
    <div class="link-left">
      <i class="fas fa-chart-line"></i>
      <span>SEO Services</span>
    </div>
    <i class="fas fa-arrow-right"></i>
  </div>

  <div class="link" onclick="openLink('#')">
    <div class="link-left">
      <i class="fas fa-briefcase"></i>
      <span>Our Portfolio</span>
    </div>
    <i class="fas fa-arrow-right"></i>
  </div>

  <div class="link" onclick="openLink('tel:+917094858696')">
    <div class="link-left">
      <i class="fas fa-phone"></i>
      <span>Call Us</span>
    </div>
    <i class="fas fa-arrow-right"></i>
  </div>

  <div class="link" onclick="openLink('mailto:info@techmayon.com')">
    <div class="link-left">
      <i class="fas fa-envelope"></i>
      <span>Email Us</span>
    </div>
    <i class="fas fa-arrow-right"></i>
  </div>

  <!-- CTA -->
  <div class="cta">
    <button onclick="openLink('#')">🚀 Start Your Project</button>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 Techmayon
  </div>

</div>

<script>
function openLink(url){
  window.open(url, "_blank");
}
</script>

</body>
</html>
