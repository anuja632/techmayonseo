<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thank You | Techmayon Digital Marketing Company</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thank you for contacting Techmayon Digital Marketing Company. Our team will get back to you shortly.">
    <meta name="robots" content="noindex, nofollow">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .thankyou-wrapper {
            background: #ffffff;
            max-width: 600px;
            width: 90%;
            padding: 40px 30px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .thankyou-wrapper img {
            max-width: 120px;
            margin-bottom: 20px;
        }

        .thankyou-wrapper h1 {
            font-size: 32px;
            color: #1e2a38;
            margin-bottom: 15px;
        }

        .thankyou-wrapper p {
            font-size: 16px;
            color: #555555;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .thankyou-wrapper .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #0066ff;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .thankyou-wrapper .btn:hover {
            background: #004dcc;
        }

        .company-name {
            margin-top: 30px;
            font-size: 14px;
            color: #888888;
        }

        @media (max-width: 480px) {
            .thankyou-wrapper h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

    <div class="thankyou-wrapper">
        <!-- Optional Logo -->
        <img src="assets/img/logo.png" alt="Techmayon Digital Marketing Company">

        <h1>Thank You!</h1>
        <p>
            Thank you for getting in touch with <strong>Techmayon Digital Marketing Company</strong>.
            We have received your message and our team will contact you shortly.
        </p>

        <a href="index.html" class="btn">Back to Home</a>

        <div class="company-name">
            © 2025 Techmayon Digital Marketing Company. All Rights Reserved.
        </div>
    </div>

</body>
</html>
